---
layout: default
---
{% for post in site.posts %}
<article class="post">
  <div class="post-date">{{ post.date | date: "%Y.%m.%d" }}</div>
  <h2 class="post-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
  <div class="post-body">
    {{ post.content }}
  </div>
</article>
{% endfor %}
